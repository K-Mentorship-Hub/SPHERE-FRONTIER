<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SPHERE FRONTIER — Docs</title>
  <link rel="stylesheet" href="./assets/css/mentorship.css">
</head>
<body>
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌙</button>
  <script>const t=localStorage.getItem("theme")||"dark";document.documentElement.setAttribute("data-theme",t);document.getElementById("themeToggle").textContent=t==="dark"?"☀️":"🌙";</script>
  <main class="page">
    <section class="hero">
      <p class="eyebrow">SPHERE FRONTIER</p>
      <h1>Documentation</h1>
      <p class="lede">Guidebooks, blueprints, and reference docs for the SET ecosystem.</p>
      <div class="hero-links">
        <a href="./index.html">Front Door</a>
        <a href="./quest.html">Quest Viewer</a>
        <a href="./dashboard.html">Dashboard</a>
      </div>
    </section>
    <div class="stats-row" id="docStats"></div>
    <div class="quest-layout">
      <nav class="quest-nav" id="docNav">
        <a href="./index.html" class="back-link">← SPHERE FRONTIER</a>
        <h2>Documents</h2>
        <div id="docList"></div>
      </nav>
      <article class="md-content" id="docContent">
        <p style="color:var(--muted);font-style:italic">Select a document from the sidebar.</p>
      </article>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="./assets/js/docs.js"></script>
  <script>document.getElementById("themeToggle").addEventListener("click",function(){const c=this.textContent==="🌙"?"dark":"light";document.documentElement.setAttribute("data-theme",c);localStorage.setItem("theme",c);this.textContent=c==="dark"?"☀️":"🌙";});</script>
</body>
</html>
